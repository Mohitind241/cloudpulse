# ============================================================
#  CloudPulse — DevSecOps CI/CD Pipeline
#  Built by: Mohit | mohitdocker241
#  Tools: SonarCloud · OWASP · Trivy · Docker · Render
# ============================================================

name: 🚀 CloudPulse DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: mohitdocker241/cloudpulse
  DOTNET_VERSION: '8.0.x'

jobs:

  # ──────────────────────────────────────────────────────────
  #  JOB 1: Build & Test (runs first, others wait for this)
  # ──────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build .NET App
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore Dependencies
        run: dotnet restore

      - name: 🏗️ Build Project
        run: dotnet build --no-restore -c Release

      - name: ✅ Build Success
        run: echo "Build completed successfully!"

  # ──────────────────────────────────────────────────────────
  #  JOB 2: SonarCloud Code Quality (runs in parallel)
  #  continue-on-error = true means it won't block pipeline
  # ──────────────────────────────────────────────────────────
  sonarcloud:
    name: 🛡️ SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true   # ← Won't block other jobs if it fails

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 🔍 Check SonarCloud Token
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "⚠️  SONAR_TOKEN not set — skipping SonarCloud"
            echo "To enable: go to sonarcloud.io → create project → add SONAR_TOKEN secret"
            exit 0
          fi
          echo "✅ SONAR_TOKEN found, running analysis..."

      - name: 🛡️ SonarCloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Mohitind241_cloudpulse
            -Dsonar.organization=mohitind241
            -Dsonar.scm.disabled=false
            -Dsonar.sources=.
            -Dsonar.exclusions=**/bin/**,**/obj/**

  # ──────────────────────────────────────────────────────────
  #  JOB 3: OWASP Dependency Scan (runs in parallel)
  # ──────────────────────────────────────────────────────────
  owasp-scan:
    name: 🔎 OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true   # ← Won't block pipeline if scan times out

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔎 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CloudPulse'
          path: '.'
          format: 'HTML'
          out: 'owasp-report'
          args: >
            --disableYarnAudit
            --disableNodeAudit
            --nvdApiDelay 6000

      - name: 📊 Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-report
          path: owasp-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  #  JOB 4: Docker Build + Trivy Scan + Push to DockerHub
  # ──────────────────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build · Trivy Scan · Push
    runs-on: ubuntu-latest
    needs: build       # ← Only waits for build, not SonarCloud/OWASP

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── Trivy: Scan source files first ─────────────────────
      - name: 🔐 Trivy — Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-fs-report.txt'

      - name: 📊 Upload Trivy FS Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.txt
          retention-days: 14

      # ── Docker Login ───────────────────────────────────────
      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Docker Build ───────────────────────────────────────
      - name: 🏗️ Build Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.run_number }} .
          docker tag  ${{ env.DOCKER_IMAGE }}:${{ github.run_number }} \
                      ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Image built: ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}"

      # ── Trivy: Scan Docker image after build ───────────────
      - name: 🔐 Trivy — Docker Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:latest'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-image-report.txt'

      - name: 📊 Upload Trivy Image Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-scan-report
          path: trivy-image-report.txt
          retention-days: 14

      # ── Push to DockerHub ──────────────────────────────────
      - name: 📤 Push Image to DockerHub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Pushed: mohitdocker241/cloudpulse:latest to DockerHub!"

  # ──────────────────────────────────────────────────────────
  #  JOB 5: Deploy to Render.com
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to Render.com
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🔍 Check Render Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK not set yet"
            echo "To enable: create account at render.com → connect repo → copy Deploy Hook URL → add as secret"
          else
            echo "✅ Render deploy hook found, triggering deployment..."
          fi

      - name: 🚀 Trigger Render Deployment
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" -X POST
          echo "✅ Deployment triggered → https://cloudpulse.onrender.com"

  # ──────────────────────────────────────────────────────────
  #  JOB 6: Pipeline Summary Report
  # ──────────────────────────────────────────────────────────
  summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [sonarcloud, owasp-scan, docker-build-push, deploy]
    if: always()

    steps:
      - name: 📋 Write Pipeline Summary
        run: |
          echo "## ☁️ CloudPulse DevSecOps Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Build | .NET 8 | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | SonarCloud | ✅ Scanned |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | OWASP | ✅ Scanned |" >> $GITHUB_STEP_SUMMARY
          echo "| Filesystem Scan | Trivy | ✅ Scanned |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | Docker | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Scan | Trivy | ✅ Scanned |" >> $GITHUB_STEP_SUMMARY
          echo "| DockerHub Push | mohitdocker241 | ✅ Pushed |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | Render.com | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🐳 Image:** \`mohitdocker241/cloudpulse:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**👨‍💻 Built by:** Mohit | Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
