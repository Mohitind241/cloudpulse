# ============================================================
#  CloudPulse — DevSecOps CI/CD Pipeline
#  Built by: Mohit | mohitdocker241
#  Tools: SonarCloud · OWASP · Trivy · Docker · Render
# ============================================================

name: 🚀 CloudPulse DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: mohitdocker241/cloudpulse
  DOTNET_VERSION: '8.0.x'

jobs:

  # ──────────────────────────────────────────────────────────
  #  JOB 1: Code Quality & Security Analysis
  # ──────────────────────────────────────────────────────────
  sonarcloud-analysis:
    name: 🛡️ SonarCloud Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for SonarCloud

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore Dependencies
        run: dotnet restore

      - name: 🏗️ Build Project
        run: dotnet build --no-restore -c Release

      - name: 🛡️ SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Mohitind241_cloudpulse
            -Dsonar.organization=mohitind241
            -Dsonar.sources=.
            -Dsonar.exclusions=**/bin/**,**/obj/**,**/*.min.js

  # ──────────────────────────────────────────────────────────
  #  JOB 2: OWASP Dependency Vulnerability Scan
  # ──────────────────────────────────────────────────────────
  owasp-scan:
    name: 🔎 OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: sonarcloud-analysis

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔎 Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CloudPulse'
          path: '.'
          format: 'HTML'
          out: 'owasp-report'
          args: >
            --enableRetired
            --disableYarnAudit

      - name: 📊 Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: owasp-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  #  JOB 3: Docker Build + Security Scan + Push
  # ──────────────────────────────────────────────────────────
  docker-build-scan-push:
    name: 🐳 Docker Build · Trivy Scan · Push
    runs-on: ubuntu-latest
    needs: owasp-scan

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── Trivy File System Scan (before build) ──────────────
      - name: 📁 Trivy — Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-fs-report.txt'

      - name: 📊 Upload Trivy FS Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.txt
          retention-days: 14

      # ── Docker Login ───────────────────────────────────────
      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Docker Build ───────────────────────────────────────
      - name: 🏗️ Build Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.run_number }} .
          docker tag  ${{ env.DOCKER_IMAGE }}:${{ github.run_number }} \
                      ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Image built: ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}"

      # ── Trivy Image Scan (after build) ─────────────────────
      - name: 🔐 Trivy — Docker Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:latest'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-image-report.txt'

      - name: 📊 Upload Trivy Image Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-scan-report
          path: trivy-image-report.txt
          retention-days: 14

      # ── Docker Push ────────────────────────────────────────
      - name: 📤 Push to DockerHub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Pushed: mohitdocker241/cloudpulse:latest"

      # ── Docker Image Summary ───────────────────────────────
      - name: 📋 Pipeline Summary
        run: |
          echo "## 🚀 CloudPulse Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SonarCloud Analysis | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP Dependency Check | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Filesystem Scan | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image Scan | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| DockerHub Push | ✅ mohitdocker241/cloudpulse:latest |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Built by Mohit** | Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  #  JOB 4: Deploy to Render.com (Free Hosting)
  # ──────────────────────────────────────────────────────────
  deploy-to-render:
    name: 🌐 Deploy to Render.com
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Trigger Render Deployment
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -X POST \
            -H "Content-Type: application/json"
          echo "✅ Deployment triggered on Render.com"
          echo "🌐 App URL: https://cloudpulse.onrender.com"
